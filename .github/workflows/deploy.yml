name: Build Flutter Web & Deploy to Vercel
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Copy API folder to build output
        run: cp -r api build/web/api

      - name: Write vercel.json into build output
        run: |
          cat > build/web/vercel.json << 'JSON'
          {
            "rewrites": [
              { "source": "/((?!api).*)", "destination": "/index.html" }
            ],
            "headers": [
              {
                "source": "/index.html",
                "headers": [{ "key": "Cache-Control", "value": "no-cache, no-store, must-revalidate" }]
              },
              {
                "source": "/flutter_bootstrap.js",
                "headers": [{ "key": "Cache-Control", "value": "no-cache, no-store, must-revalidate" }]
              },
              {
                "source": "/assets/(.*)",
                "headers": [{ "key": "Cache-Control", "value": "public, max-age=31536000, immutable" }]
              }
            ]
          }
          JSON

      - name: Install Vercel CLI (latest)
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: build/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (Preview - PR only)
        if: github.event_name == 'pull_request'
        run: vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: build/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}