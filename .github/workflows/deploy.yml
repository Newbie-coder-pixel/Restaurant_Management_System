name: Build Flutter Web & Deploy to Vercel
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: false

      - name: Install dependencies
        run: flutter pub get

      # ── Build & package tiap app ───────────────────────────────
      # vercel.json di-copy dari ROOT repo (sudah ada "functions" block yang benar)
      # Tidak pakai heredoc inline — heredoc dengan indentasi YAML menyebabkan
      # delimiter penutup tidak dikenali bash → file vercel.json kosong/corrupt → 404

      - name: Build Flutter Web (Staff)
        run: flutter build web --release --dart-define=APP_MODE=staff

      - name: Copy API & vercel.json (Staff)
        run: |
          cp -r api build/web/api
          cp vercel.json build/web/vercel.json

      - name: Copy Staff build
        run: cp -r build/web build/staff

      - name: Build Flutter Web (Customer)
        run: flutter build web --release --dart-define=APP_MODE=customer

      - name: Copy API & vercel.json (Customer)
        run: |
          cp -r api build/web/api
          cp vercel.json build/web/vercel.json

      - name: Copy Customer build
        run: cp -r build/web build/customer

      - name: Build Flutter Web (QR)
        run: flutter build web --release --dart-define=APP_MODE=qr

      - name: Copy API & vercel.json (QR)
        run: |
          cp -r api build/web/api
          cp vercel.json build/web/vercel.json

      - name: Copy QR build
        run: cp -r build/web build/qr

      # ── Verify build contents sebelum deploy ───────────────────

      - name: Verify build contents
        run: |
          echo "=== build/staff/ ==="
          ls -la build/staff/
          echo ""
          echo "=== build/staff/api/ ==="
          ls -la build/staff/api/ || echo "❌ api folder MISSING di staff!"
          echo ""
          echo "=== build/customer/api/ ==="
          ls -la build/customer/api/ || echo "❌ api folder MISSING di customer!"
          echo ""
          echo "=== build/qr/api/ ==="
          ls -la build/qr/api/ || echo "❌ api folder MISSING di qr!"
          echo ""
          echo "=== vercel.json staff (harus ada 'functions') ==="
          cat build/staff/vercel.json || echo "❌ vercel.json MISSING di staff!"

      # ── Install Vercel CLI ─────────────────────────────────────

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ── Deploy Staff ───────────────────────────────────────────

      - name: Deploy Staff to Vercel (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: build/staff
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAFF }}

      - name: Deploy Staff to Vercel (Preview)
        if: github.event_name == 'pull_request'
        run: vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: build/staff
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAFF }}

      # ── Deploy Customer ────────────────────────────────────────

      - name: Deploy Customer to Vercel (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: build/customer
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CUSTOMER }}

      - name: Deploy Customer to Vercel (Preview)
        if: github.event_name == 'pull_request'
        run: vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: build/customer
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CUSTOMER }}

      # ── Deploy QR ──────────────────────────────────────────────

      - name: Deploy QR to Vercel (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: build/qr
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_QR }}

      - name: Deploy QR to Vercel (Preview)
        if: github.event_name == 'pull_request'
        run: vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: build/qr
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_QR }}