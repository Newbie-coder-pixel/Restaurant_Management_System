name: restaurant_management_system
description: Restaurant Management System - Multi-branch, Multi-role
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  geolocator: ^13.0.1
  file_picker: ^8.0.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Supabase (Backend + Auth + Realtime) ──────────────────
  supabase_flutter: ^2.5.6

  # ── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────
  go_router: ^13.2.0

  # ── UI Components ─────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  fl_chart: ^0.67.0          # Charts for reports
  data_table_2: ^2.5.14      # Tables for reports
  flutter_slidable: ^3.1.0   # Swipeable list items
  dotted_border: ^2.1.0
  lottie: ^3.1.0             # Animations (KDS, loading)

  # ── Forms & Input ─────────────────────────────────────────
  reactive_forms: ^17.0.1
  flutter_typeahead: ^5.2.0
  intl: ^0.20.2
  intl_phone_number_input: ^0.7.4

  # ── Printing & PDF (receipts) ─────────────────────────────
  pdf: ^3.11.0
  printing: ^5.13.0
  qr_flutter: ^4.1.0         # QR codes for tables

  # ── Notifications ─────────────────────────────────────────
  flutter_local_notifications: ^17.2.1+2
  firebase_messaging: ^15.1.0  # Push notifications (optional)

  # ── Network & API ─────────────────────────────────────────
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ── Storage & Local Cache ─────────────────────────────────
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0

  # ── Device & Platform ─────────────────────────────────────
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  screen_brightness: ^1.0.1   # KDS screen always on
  wakelock_plus: ^1.2.8       # KDS keep screen awake

  # ── Utils ─────────────────────────────────────────────────
  uuid: ^4.4.0
  http: ^1.2.2
  collection: ^1.18.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  logger: ^2.3.0
  timeago: ^3.6.1
  table_calendar: ^3.1.2       # Booking calendar

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700